# =============================================================================
# RetailFlow AI — Docker Compose (Local Development)
# =============================================================================
# Usage:
#   make up         → Start all services
#   make down       → Stop all services
#   make logs       → Tail logs for all services
#   make migrate    → Run database migrations
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: retailflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retailflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-retailflow_db}
      # Also create the test database
      POSTGRES_MULTIPLE_DATABASES: retailflow_db,retailflow_test
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailflow} -d ${POSTGRES_DB:-retailflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retailflow_network

  # ---------------------------------------------------------------------------
  # Redis Cache + Pub/Sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: retailflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailflow_network

  # ---------------------------------------------------------------------------
  # Backend — FastAPI Core API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development       # Use development stage (with hot reload)
    container_name: retailflow_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-retailflow}:${POSTGRES_PASSWORD:-retailflow_dev_password}@postgres:5432/${POSTGRES_DB:-retailflow_db}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app                # Mount source for hot reload
      - backend_venv:/app/.venv       # Cache pip installs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - retailflow_network

  # ---------------------------------------------------------------------------
  # AI Service — YOLOv8 + XGBoost
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      target: development
    container_name: retailflow_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORE_API_URL=http://backend:8000
    volumes:
      - ./ai-service:/app
      - ai_models:/app/models         # Persist downloaded YOLO weights
    ports:
      - "8001:8001"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s              # Extra time for YOLO model download
    networks:
      - retailflow_network

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 14
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: retailflow_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # Cache npm installs
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - retailflow_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_venv:
    driver: local
  ai_models:
    driver: local
  frontend_node_modules:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  retailflow_network:
    driver: bridge
    name: retailflow_network
