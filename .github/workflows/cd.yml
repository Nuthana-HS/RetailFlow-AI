# =============================================================================
# RetailFlow AI — Continuous Deployment Pipeline
# =============================================================================
# Triggers: Push to main branch ONLY (after CI passes)
# Jobs:
#   1. deploy-frontend  → Deploy to Vercel
#   2. deploy-backend   → Trigger Render.com deploy hook
#   3. deploy-ai        → Trigger Render.com AI service deploy hook
# =============================================================================

name: CD

on:
  push:
    branches: [main]

# Only one deployment runs at a time
concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Deploy Frontend to Vercel
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: 🚀 Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: frontend
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Comment deployment URL on commit
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ Frontend deployed to: ${{ steps.deploy.outputs.url }}`
            })

  # ---------------------------------------------------------------------------
  # Deploy Backend to Render.com
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: 🚀 Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: deploy-frontend  # Deploy backend after frontend to avoid API downtime

    steps:
      - name: Trigger Render backend deployment
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Wait for deployment to complete
        run: |
          echo "Backend deployment triggered. Waiting 60 seconds for health check..."
          sleep 60

      - name: Health check backend
        run: |
          max_retries=10
          retry_interval=15
          for i in $(seq 1 $max_retries); do
            echo "Health check attempt $i/$max_retries..."
            if curl -sf "${{ secrets.BACKEND_PRODUCTION_URL }}/health"; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "Not ready yet. Waiting ${retry_interval}s..."
            sleep $retry_interval
          done
          echo "❌ Backend health check failed after $max_retries attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy AI Service to Render.com
  # ---------------------------------------------------------------------------
  deploy-ai-service:
    name: 🤖 Deploy AI Service (Render)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Trigger Render AI service deployment
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "${{ secrets.RENDER_AI_DEPLOY_HOOK }}"

      - name: Wait for AI service startup
        run: |
          echo "AI service deployment triggered. Waiting 120 seconds (YOLO model loading)..."
          sleep 120

      - name: Health check AI service
        run: |
          max_retries=10
          retry_interval=15
          for i in $(seq 1 $max_retries); do
            echo "AI health check attempt $i/$max_retries..."
            if curl -sf "${{ secrets.AI_SERVICE_PRODUCTION_URL }}/health"; then
              echo "✅ AI Service is healthy!"
              exit 0
            fi
            echo "Not ready yet. Waiting ${retry_interval}s..."
            sleep $retry_interval
          done
          echo "❌ AI Service health check failed after $max_retries attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # Post-Deployment Notification
  # ---------------------------------------------------------------------------
  notify-deployment:
    name: 📢 Notify Deployment Success
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-ai-service]
    if: always()

    steps:
      - name: Report deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.deploy-frontend.result }}' === 'success' &&
                           '${{ needs.deploy-backend.result }}' === 'success' &&
                           '${{ needs.deploy-ai-service.result }}' === 'success'
                           ? '✅ All services deployed successfully' 
                           : '❌ Deployment had failures — check the Actions log';

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## Deployment Summary\n\n${status}\n\n` +
                    `- Frontend: ${{ needs.deploy-frontend.result }}\n` +
                    `- Backend: ${{ needs.deploy-backend.result }}\n` +
                    `- AI Service: ${{ needs.deploy-ai-service.result }}\n`
            });
