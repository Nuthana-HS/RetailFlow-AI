# =============================================================================
# RetailFlow AI — Continuous Integration Pipeline
# =============================================================================
# Triggers: Every push and pull request to main and develop branches
# Jobs:
#   1. lint-backend    → ruff + mypy
#   2. test-backend    → pytest with coverage
#   3. lint-frontend   → ESLint + TypeScript
#   4. test-frontend   → Jest
#   5. build-docker    → Verify Docker images build successfully
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend Linting
  # ---------------------------------------------------------------------------
  lint-backend:
    name: 🐍 Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff linter
        working-directory: backend
        run: ruff check app/ tests/

      - name: Run ruff formatter check
        working-directory: backend
        run: ruff format --check app/ tests/

      - name: Run mypy type checker
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Backend Tests
  # ---------------------------------------------------------------------------
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retailflow_test
          POSTGRES_PASSWORD: retailflow_test_password
          POSTGRES_DB: retailflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://retailflow_test:retailflow_test_password@localhost:5432/retailflow_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-that-is-at-least-32-characters-long
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_SECONDS: 900
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: testing
      AI_SERVICE_API_KEY: ci-test-ai-service-key
      AI_SERVICE_URL: http://localhost:8001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Frontend Linting
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: 🎨 Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

  # ---------------------------------------------------------------------------
  # Frontend Tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --coverage --watchAll=false --ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # AI Service Linting
  # ---------------------------------------------------------------------------
  lint-ai-service:
    name: 🤖 Lint AI Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        working-directory: ai-service
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run ruff linter
        working-directory: ai-service
        run: ruff check app/ tests/

  # ---------------------------------------------------------------------------
  # Docker Build Verification
  # ---------------------------------------------------------------------------
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: retailflow-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: retailflow-frontend:ci

      - name: Build AI service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: retailflow-ai:ci

  # ---------------------------------------------------------------------------
  # CI Summary
  # ---------------------------------------------------------------------------
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: success()

    steps:
      - name: CI Success
        run: echo "All CI checks passed! Ready for deployment."
